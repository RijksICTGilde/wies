{% if value %}
  {% for row in value %}
    <div class="nldd-org-crumb">
      <a href="{{ url("assignment-list") }}?org={{ row.organization.id }}">{{ row.organization.name }}</a>
      {% if row.role == "PRIMARY" and value|length > 1 %}<span class="nldd-text-secondary">(primair)</span>{% endif %}
    </div>
  {% endfor %}
{% else %}
  <em class="nldd-text-secondary">Geen organisatie opgegeven</em>
{% endif %}
