{% if value.start_date or value.end_date %}
  <span>
    {% if value.start_date %}
      {{ value.start_date|datum_nl("j F Y") }}
    {% else %}
      ?
    {% endif %}
    –
    {% if value.end_date %}
      {{ value.end_date|datum_nl("j F Y") }}
    {% else %}
      ?
    {% endif %}
  </span>
{% else %}
  <em class="ndd-text-secondary">Geen periode opgegeven</em>
{% endif %}
