{% set category = editable.category %}
{% set category_labels = value | selectattr("category_id", "equalto", category.id) | list %}
<div class="ndd-panel__tokens">
  {% if category_labels %}
    {% for label in category_labels %}
      <ndd-token style="--ndd-token-bg: {{ category.color }}">{{ label.name }}</ndd-token>
    {% endfor %}
  {% else %}
    <em class="ndd-text-secondary">Geen labels</em>
  {% endif %}
</div>
