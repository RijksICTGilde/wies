{% set category = editable.category %} {% set category_labels = value |
 selectattr("category_id", "equalto", category.id) | list %}
<nldd-container layout="wrap" gap="6">
{% if category_labels %}
  {% for label in category_labels %}
    <nldd-tag color="{{ category.nldd_color }}">{{ label.name }}</nldd-tag>
  {% endfor %}
{% else %}
  <em class="nldd-text-secondary">Geen labels</em>
{% endif %}
</nldd-container>
