{# Real NLDD multi-line text field. Form-associated: value reaches the form
   natively. nldd-form-field sets input-id/size/accessible-label. #}
<nldd-multi-line-text-field name="{{ widget.name }}"
{% if widget.value %}value="{{ widget.value }}"{% endif %}
{% if widget.attrs.required %}required{% endif %}
{% if widget.attrs.placeholder %}placeholder="{{ widget.attrs.placeholder }}"{% endif %}
{% if widget.attrs.rows %}rows="{{ widget.attrs.rows }}"{% endif %}
{% if widget.attrs.invalid %}invalid error-message="{{ widget.attrs['error-message'] }}"{% endif %}
></nldd-multi-line-text-field>
