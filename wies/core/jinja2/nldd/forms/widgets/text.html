{# Real NLDD text field. Form-associated: its value reaches the form natively,
   no bridge. nldd-form-field sets input-id/size/accessible-label on it. #}
<nldd-text-field type="{{ widget.type }}"
                 name="{{ widget.name }}"
                 {% if widget.value %}value="{{ widget.value }}"{% endif %}
                 {% if widget.attrs.required %}required{% endif %}
                 {% if widget.attrs.placeholder %}placeholder="{{ widget.attrs.placeholder }}"{% endif %}
                 {% if widget.attrs.autocomplete %}autocomplete="{{ widget.attrs.autocomplete }}"{% endif %}
                 {% if widget.attrs.maxlength %}maxlength="{{ widget.attrs.maxlength }}"{% endif %}></nldd-text-field>
