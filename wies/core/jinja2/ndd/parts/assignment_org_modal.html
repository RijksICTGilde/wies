<nldd-window id="assignmentOrgPickerModal" accessible-label="Selecteer opdrachtgever(s)" width="900px" height="600px">
<nldd-page sticky-header sticky-footer>
<nldd-top-title-bar slot="header" text="Selecteer opdrachtgever(s)" dismiss-text="Sluiten"></nldd-top-title-bar>
<nldd-container>
<div class="ndd-client-modal__body">
  <div class="ndd-client-modal__search">
    <nldd-search-field id="assignment-org-search" placeholder="Zoek opdrachtgever..." aria-label="Zoek opdrachtgever"></nldd-search-field>
  </div>
  <div class="ndd-client-modal__layout">
    <div class="ndd-client-modal__tree" id="assignment-org-tree-container"></div>
    <div class="ndd-client-modal__selection">
      <div class="ndd-client-modal__selection-header">
        <strong>Geselecteerd</strong>
        <span id="assignment-org-selection-count"
              class="ndd-client-modal__selection-count"
              style="display: none">0</span>
      </div>
      <ul id="assignment-org-selection-list"
          class="ndd-client-modal__selection-list">
        <li class="ndd-client-modal__empty-state" hidden></li>
      </ul>
    </div>
  </div>
</div>
</nldd-container>
<nldd-container slot="footer" padding="16">
<nldd-button-group orientation="horizontal">
<nldd-button variant="secondary" type="button" text="Annuleren" onclick="this.closest('ndd-window').hide()"></nldd-button>
<nldd-button variant="neutral-transparent" type="button" id="assignment-org-clear-btn" text="Selectie wissen"></nldd-button>
<nldd-button variant="primary" type="button" id="assignment-org-apply-btn" text="Toevoegen"></nldd-button>
</nldd-button-group>
</nldd-container>
</nldd-page>
{{ hierarchy|json_script("assignment-org-data") }}
{{ current_selections|json_script("assignment-org-current-selections") }}
</nldd-window>
