<dialog class="rvo-dialog rvo-dialog--wit rvo-dialog--inset-inline-end"
        aria-label="{{ panel_data.panel_title }}"
        closedby="none"
        id="side_panel">
  <div class="side-panel__header">
    <c-button kind="tertiary"
              size="md"
              icon="terug"
              iconPlacement="before"
              type="button"
              data-action="side-panel-back">
      Terug
    </c-button>
    <button autofocus
            type="button"
            class="modal-close-button"
            data-action="side-panel-close">×</button>
  </div>
  <div id="side_panel-content" class="rvo-dialog__content">{% include panel_data.panel_content_template %}</div>
</dialog>
