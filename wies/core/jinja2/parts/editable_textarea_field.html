<div class="editable-field-display">
  {% if field_value %}
    {% if field_value|length > 300 %}
      <span>
        <span class="truncated-text" style="display: block;">{{ field_value[:300] }}...</span>
        <span class="full-text" style="display: none;">{{ field_value }}</span>
        <button type="button" class="show-more-toggle" onclick="toggleShowMore(this)">
          <span class="show-more-toggle__icon">+</span>
          <span class="show-more-toggle__text">Toon meer</span>
        </button>
      </span>
    {% else %}
      <span class="pre-wrap">{{ field_value }}</span>
    {% endif %}
  {% else %}
    <span class="rvo-text--italic rvo-text--subtle">Niet ingevuld</span>
  {% endif %}
  {% if user_can_edit %}
    <button type="button"
            class="edit-icon-button"
            hx-get="{{ edit_url }}"
            hx-target="#{{ target_element }}"
            hx-swap="innerHTML"
            aria-label="Bewerk {{ field_label }}">
      <span class="utrecht-icon rvo-icon rvo-icon-bewerken rvo-icon--md"
            role="img"
            aria-label="Bewerk"></span>
    </button>
  {% endif %}
</div>
