{% if search_term %}
  <ul class="search-suggestions" role="listbox">
    {# Primary action: full-text search on the typed term (same as pressing Enter) #}
    <li>
      <button type="button" class="search-suggestion search-suggestion--search">
        <c-icon icon="zoek" size="sm" class="search-suggestion__icon" />
        <span>Zoeken op <strong>"{{ search_term }}"</strong></span>
      </button>
    </li>
    {% if org_suggestions %}
      <li class="search-suggestions__header">Of filter op opdrachtgever:</li>
      {% for org in org_suggestions %}
        <li>
          <button type="button"
                  class="search-suggestion"
                  data-org-id="{{ org.id }}"
                  data-org-label="{{ org.label or org.name }}">{{ org.label or org.name }}</button>
        </li>
      {% endfor %}
    {% endif %}
  </ul>
{% endif %}
