<dialog id="assignmentOrgPickerModal"
        class="modal-dialog modal-dialog--wide"
        closedby="any">
  <div class="modal-content">
    <div class="modal-header">
      <c-h2>Selecteer opdrachtgever(s)</c-h2>
      <button type="button" class="close modal-close-button">×</button>
    </div>
    <div class="modal-body client-modal__body">
      <div class="client-modal__search">
        <div class="search-field-wrapper">
          <c-icon icon="zoek" color="lintblauw" size="md" class="search-icon" />
          <input type="text"
                 id="assignment-org-search"
                 class="utrecht-textbox"
                 placeholder="Zoek opdrachtgever..."
                 aria-label="Zoek opdrachtgever" />
          <button type="button" class="search-clear" aria-label="Zoekopdracht wissen">×</button>
        </div>
      </div>
      <div class="client-modal__layout">
        <div class="client-modal__tree" id="assignment-org-tree-container"></div>
        <div class="client-modal__selection">
          <div class="client-modal__selection-header">
            <span class="rvo-label client-modal__selection-title">Geselecteerd
              <span id="assignment-org-selection-count"
                    class="client-modal__selection-count"
                    style="display: none">0</span>
            </span>
          </div>
          <ul id="assignment-org-selection-list"
              class="client-modal__selection-list">
            <li class="client-modal__empty-state" hidden></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-buttons">
        <div class="close">
          <c-button kind="secondary" type="button">Annuleren</c-button>
        </div>
        <c-button kind="warning-subtle" type="button" id="assignment-org-clear-btn">
        Selectie wissen
        </c-button>
      </div>
      <c-button kind="primary" type="button" id="assignment-org-apply-btn">
      Toevoegen
      </c-button>
    </div>
  </div>
  {{ hierarchy|json_script("assignment-org-data") }}
  {{ current_selections|json_script("assignment-org-current-selections") }}
</dialog>
