<div class="editable-field-display">
  <div class="rvo-layout-row rvo-layout-gap--sm" style="flex-wrap: wrap">
    {% if labels %}
      {% for label in labels %}
        <span class="rvo-badge"
              style="background-color: {{ category.color }};
                     padding: 0.25rem 0.5rem;
                     border-radius: 3px;
                     white-space: nowrap">{{ label.name }}</span>
      {% endfor %}
    {% else %}
      <span class="rvo-text--italic rvo-text--subtle">Geen labels</span>
    {% endif %}
  </div>
  <button type="button"
          class="edit-icon-button"
          hx-get="{{ edit_url }}"
          hx-target="#{{ target_element }}"
          hx-swap="innerHTML"
          aria-label="Bewerk {{ category.name }}">
    <c-icon icon="bewerken" size="md" />
  </button>
</div>
