<dialog id="opdrachtgeverModal"
        class="modal-dialog modal-dialog--wide"
        closedby="any">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="utrecht-heading-2">Selecteer opdrachtgevers</h2>
      <button type="button" class="close modal-close-button">×</button>
    </div>
    <div class="modal-body opdrachtgever-modal__body">
      <div class="opdrachtgever-modal__search">
        <div class="search-field-wrapper">
          <c-icon icon="zoek" color="logoblauw" size="md" class="search-icon" />
          <c-input id="opdrachtgever-search" placeholder="Zoek opdrachtgever..." aria-label="Zoek opdrachtgever" size />
        </div>
      </div>
      <div class="opdrachtgever-modal__layout">
        <div class="opdrachtgever-modal__tree" id="opdrachtgever-tree-container"></div>
        <div class="opdrachtgever-modal__selection">
          <h3 class="opdrachtgever-modal__selection-title">Geselecteerd</h3>
          <ul id="opdrachtgever-selection-list"
              class="opdrachtgever-modal__selection-list">
            <li class="opdrachtgever-modal__empty-state">Niets geselecteerd</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-buttons">
        <div class="close">
          <c-button kind="secondary" type="button">Annuleren</c-button>
        </div>
        <c-button kind="warning-subtle" type="button" id="opdrachtgever-clear-btn">
        Filter verwijderen
        </c-button>
      </div>
      <c-button kind="primary" type="button" id="opdrachtgever-apply-btn">
      Filter toepassen
      </c-button>
    </div>
  </div>
  <script>window.__opdrachtgeverData = {{ hierarchy_json|safe }};</script>
  <script src="{{ static('js/opdrachtgever_tree.js') }}"></script>
</dialog>
