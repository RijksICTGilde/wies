<dialog id="clientModal"
        class="modal-dialog modal-dialog--wide"
        closedby="any">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="utrecht-heading-2">Selecteer opdrachtgever(s)</h2>
      <button type="button" class="close modal-close-button">×</button>
    </div>
    <div class="modal-body client-modal__body">
      <div class="client-modal__search">
        <ndd-search-field id="client-search" placeholder="Zoek opdrachtgever..." aria-label="Zoek opdrachtgever" style="width:100%;">
        </ndd-search-field>
      </div>
      <div class="client-modal__layout">
        <div class="client-modal__tree" id="client-tree-container"></div>
        <div class="client-modal__selection">
          <div class="client-modal__selection-header">
            <span class="client-modal__selection-title">Geselecteerd
              <span id="client-selection-count"
                    class="client-modal__selection-count"
                    style="display: none">0</span>
            </span>
            <span id="client-results-count" class="client-modal__results-count"></span>
          </div>
          <ul id="client-selection-list" class="client-modal__selection-list">
            <li class="client-modal__empty-state" hidden></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-buttons">
        <div class="close">
          <ndd-button kind="secondary" variant="secondary" type="button" text="Annuleren"></ndd-button>
        </div>
        <ndd-button variant="neutral-transparent" type="button" id="client-clear-btn" text="Filter verwijderen"></ndd-button>
      </div>
      <ndd-button variant="primary" type="button" id="client-apply-btn" text="Filter toepassen"></ndd-button>
    </div>
  </div>
  {{ hierarchy|json_script("client-data") }}
  {{ current_selections|json_script("client-current-selections") }}
  <script src="{{ static('js/tree_state.js') }}"></script>
  <script src="{{ static('js/client_tree.js') }}"></script>
</dialog>
