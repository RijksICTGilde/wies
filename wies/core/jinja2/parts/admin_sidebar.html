<div class="sidebar__content">
  <nav class="rvo-menubar rvo-menubar--md">
    <ul class="rvo-menubar__ul">
      <li class="rvo-menubar__list rvo-menubar__list--vertical">
        <ul class="rvo-menubar__group--flex rvo-menubar__group--vertical">
          <li class="rvo-menubar__item">
            <a href="{{ url('admin-users') }}"
               class="rvo-link rvo-link--with-icon rvo-link--no-underline rvo-link--lintblauw {% if '/gebruikers/' in request.path %}menu-item--active{% endif %}">
              <c-icon icon="user" size="md" color="lintblauw" class="rvo-link__icon--before" />
              Gebruikers
            </a>
          </li>
          {% if DEBUG %}
            <li class="rvo-menubar__item">
              <a href="{{ url('organization-admin') }}"
                 class="rvo-link rvo-link--with-icon rvo-link--no-underline rvo-link--lintblauw {% if '/organisaties/' in request.path %}menu-item--active{% endif %}">
                <c-icon icon="publicatie" size="md" color="lintblauw" class="rvo-link__icon--before" />
                Opdrachtgevers
              </a>
            </li>
          {% endif %}
          <li class="rvo-menubar__item">
            <a href="{{ url('label-admin') }}"
               class="rvo-link rvo-link--with-icon rvo-link--no-underline rvo-link--lintblauw {% if '/labels/' in request.path %}menu-item--active{% endif %}">
              <c-icon icon="label" size="md" color="lintblauw" class="rvo-link__icon--before" />
              Labels
            </a>
          </li>
          {% if can_view_staff_page(user) %}
            <li class="rvo-menubar__item">
              <a href="{{ url('staff-dashboard') }}"
                 class="rvo-link rvo-link--with-icon rvo-link--no-underline rvo-link--lintblauw {% if '/statistieken/' in request.path %}menu-item--active{% endif %}">
                <span class="utrecht-icon rvo-icon rvo-icon-grafiek rvo-icon--md rvo-icon--lintblauw rvo-link__icon--before"
                      role="img"
                      aria-label="Statistieken"></span>
                Statistieken
              </a>
            </li>
            <li class="rvo-menubar__item">
              <a href="{{ url('staff-database') }}"
                 class="rvo-link rvo-link--with-icon rvo-link--no-underline rvo-link--lintblauw {% if '/database/' in request.path %}menu-item--active{% endif %}">
                <span class="utrecht-icon rvo-icon rvo-icon-database rvo-icon--md rvo-icon--lintblauw rvo-link__icon--before"
                      role="img"
                      aria-label="Database"></span>
                Database
              </a>
            </li>
          {% endif %}
        </ul>
      </li>
    </ul>
  </nav>
</div>
