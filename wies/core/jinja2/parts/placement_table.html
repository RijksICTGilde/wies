{# Placement table — echte nldd-table met responsive columns. #}
<div id="nldd-placement-table">
  <nldd-table columns="40px minmax(160px, 3fr) minmax(220px, 4fr) minmax(96px, 132px) 24px"
              accessible-label="Wie zit waar">
    <nldd-table-row slot="header">
      <nldd-cell></nldd-cell>
      <nldd-text-cell text="Collega"></nldd-text-cell>
      <nldd-text-cell text="Opdracht"></nldd-text-cell>
      <nldd-text-cell text="Loopt tot" horizontal-alignment="right"></nldd-text-cell>
      <nldd-cell></nldd-cell>
    </nldd-table-row>
    {% include "parts/placement_table_rows.html" %}
  </nldd-table>
</div>
