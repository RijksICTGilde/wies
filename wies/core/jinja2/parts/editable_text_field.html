<div class="editable-field-display">
  <span>{{ field_value }}</span>
  {% if user_can_edit %}
    <button type="button"
            class="edit-icon-button"
            hx-get="{{ edit_url }}"
            hx-target="#{{ target_element }}"
            hx-swap="innerHTML"
            aria-label="Bewerk {{ field_label }}">
      <c-icon icon="bewerken" size="md" />
    </button>
  {% endif %}
</div>
