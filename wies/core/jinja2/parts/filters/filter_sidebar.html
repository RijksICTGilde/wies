<div class="sidebar__toggle-row">
  <c-h3 class="sidebar__title" noMargins>
  <span class="sidebar__title-text">Filters</span>
  </c-h3>
  <button type="button"
          class="sidebar-toggle"
          data-toggle-filters
          aria-label="Toggle filters">
    <svg class="sidebar-toggle__icon sidebar-toggle__icon--chevron"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2">
      <path d="M15 18l-6-6 6-6" />
    </svg>
    <c-icon icon="kruis" size="md" class="sidebar-toggle__icon sidebar-toggle__icon--close" />
  </button>
</div>
<form class="rvo-form filter-sidebar-form"
      hx-get="{{ filter_target_url }}"
      hx-target="#filter-and-table-container"
      hx-swap="innerHTML settle:0"
      hx-replace-url="true"
      hx-trigger="change,input delay:500ms from:[data-filter-input]"
      hx-include="[data-filter-input]">
  <!-- Hidden input for search filter (updated by JS on Enter) -->
  <input type="hidden"
         id="search-filter-value"
         name="zoek"
         value="{%- if search_filter -%}{{ search_filter }}{%- endif -%}"
         data-filter-input />
  <!-- Hidden inputs for organization filter (updated by client_tree.js on apply) -->
  <div id="org-filter-inputs">
    {% for chip in org_chip_data %}
      <input type="hidden"
             name="{{ chip.param_name }}"
             value="{{ chip.param_value }}"
             data-filter-input
             data-label="{{ chip.label }}">
    {% endfor %}
  </div>
  <!-- Filter Fields -->
  <div class="sidebar__content">{% include "parts/filters/filter_fields.html" %}</div>
</form>
