{% set page_messages = get_messages(request) %}
{% if page_messages %}
  <div class="flash-messages" id="flash-messages">
    {% for message in page_messages %}
      {% set link = message.extra_tags|parse_message_link %}
      <c-alert kind="{{ 'success' if 'success' in message.tags else 'error' if 'error' in message.tags else 'info' }}">
      {{ message }}
      {% if link %}<c-link href="{{ link.url }}">{{ link.text }}</c-link>{% endif %}
      </c-alert>
    {% endfor %}
  </div>
{% endif %}
