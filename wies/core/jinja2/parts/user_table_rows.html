{% for user in object_list %}
  <nldd-table-row type="button" hx-get="{{ url('user-edit', args=[user.id]) }}" hx-target="#userFormModal" hx-swap="innerHTML" style="cursor: pointer;">
    <nldd-icon-cell>
      <span class="nldd-avatar" aria-hidden="true">{{ user.first_name|first|upper if user.first_name else user.email|first|upper }}</span>
    </nldd-icon-cell>
    <nldd-text-cell text="{{ user.first_name }} {{ user.last_name }}"
                    supporting-text="{{ user.email }}"></nldd-text-cell>
    <nldd-icon-cell color="secondary" size="16" icon="chevron-right"></nldd-icon-cell>
  </nldd-table-row>
{% else %}
  <nldd-table-row>
    <nldd-text-cell text="Geen gebruikers gevonden."></nldd-text-cell>
  </nldd-table-row>
{% endfor %}
{% if next_page_url %}
  <nldd-table-row hx-get="{{ next_page_url }}" hx-trigger="revealed" hx-swap="outerHTML">
    <nldd-text-cell text="Meer laden…" color="secondary"></nldd-text-cell>
  </nldd-table-row>
{% endif %}
