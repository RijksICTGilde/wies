name: PR Cleanup

on:
  pull_request:
    types: [closed]

env:
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}
  DEPLOYMENT_NAME: pr-${{ github.event.pull_request.number }}

jobs:
  cleanup:
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write
      packages: write
      pull-requests: write

    steps:
      - name: Cleanup ZAD deployment and images
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: wies
          deployment-name: ${{ env.DEPLOYMENT_NAME }}
          delete-github-env: true
          delete-github-deployments: true
          delete-container: true
          containers: |
            [
              {"org": "rijksictgilde", "name": "wies", "tag": "${{ env.IMAGE_TAG }}"},
              {"org": "rijksictgilde", "name": "wies-worker", "tag": "${{ env.IMAGE_TAG }}"}
            ]
          delete-pr-comment: true
