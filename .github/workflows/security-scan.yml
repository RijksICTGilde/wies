# Trivy scanning with results published to the repo's Security tab (Code scanning alerts).
#
# Two complementary jobs:
#   - filesystem: scans the repo source for vulnerable deps, leaked secrets and
#     IaC/config misconfigurations (Dockerfile, workflows, ...).
#   - image: builds the deployed container and scans it, adding coverage of the
#     OS package layer (Debian packages) that the filesystem scan can't see.
# They overlap on Python dependency CVEs; separate SARIF categories keep the two
# result sets distinct in the Security tab.
#
# Design notes:
#   - Uses aquasecurity/trivy-action, pinned to a full commit SHA (never a tag).
#   - Every third-party action is pinned to a full commit SHA or major tag.
#   - Default permissions are empty; each job opts in to the minimum it needs.
#   - The scan jobs have no access to deployment secrets.
#   - Only HIGH/CRITICAL findings that have an available fix are reported.

name: trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan: new CVEs get published against code you haven't touched.
    - cron: "17 4 * * 1"
  workflow_dispatch:

# Deny by default. Jobs grant themselves what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filesystem:
    name: Trivy (deps, secrets, IaC)
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Don't leave the GITHUB_TOKEN sitting in .git/config for later steps.
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
          timeout: 10m

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image:
    name: Trivy (container image)
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the web image locally (no push) so Trivy can scan the same
      # artifact that gets deployed. The worker target shares the django-run
      # base, so its OS packages and Python deps are covered by this scan.
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: false
          load: true
          tags: wies:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: wies:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"
          timeout: 10m

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
