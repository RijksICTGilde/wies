name: Deploy to Staging

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/rijksictgilde/wies

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: true
          tags: ${{ env.IMAGE_NAME }}:main

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: worker
          push: true
          tags: ${{ env.IMAGE_NAME }}-worker:main

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      deployments: write

    environment:
      name: main
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Deploy to ZAD
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: wies
          deployment-name: main
          components: |
            [
              {"name": "frontend", "image": "${{ env.IMAGE_NAME }}:main"},
              {"name": "worker", "image": "${{ env.IMAGE_NAME }}-worker:main"}
            ]
