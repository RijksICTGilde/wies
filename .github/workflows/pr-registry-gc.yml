name: PR Registry GC

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log actions without deleting"
        required: false
        default: "false"

# Deny by default; the job grants itself the minimum it needs.
permissions: {}

jobs:
  gc:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Prune old PR container images
        # No moving v3 tag exists for this action; pin the exact release.
        uses: snok/container-retention-policy@d3bdcf5ce9b05f685154e4a16c39233b245e3d53 # v3.1.0
        with:
          account: rijksictgilde
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "wies wies-worker"
          image-tags: "!main !latest !v*"
          tag-selection: both
          cut-off: 30d
          keep-n-most-recent: 1
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}
