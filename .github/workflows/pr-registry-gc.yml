name: PR Registry GC

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log actions without deleting"
        required: false
        default: "false"

jobs:
  gc:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Prune old PR container images
        uses: snok/container-retention-policy@v3
        with:
          account: rijksictgilde
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "wies wies-worker"
          image-tags: "!main !latest !v*"
          tag-selection: both
          cut-off: 30d
          keep-n-most-recent: 1
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}
