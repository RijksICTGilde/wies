name: PR Registry GC

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log actions without deleting"
        required: false
        default: "false"

jobs:
  gc:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      pull-requests: read

    steps:
      - name: Garbage collect PR container images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: rijksictgilde
          REPO: ${{ github.repository }}
          PACKAGES: wies wies-worker
          KEEP_PER_OPEN_PR: "1"
          CLOSED_PR_GRACE_DAYS: "7"
          UNTAGGED_GRACE_DAYS: "14"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 <<'PY'
          import json, os, re, subprocess, sys
          from datetime import datetime, timezone, timedelta

          ORG = os.environ["ORG"]
          REPO = os.environ["REPO"]
          PACKAGES = os.environ["PACKAGES"].split()
          KEEP_PER_OPEN_PR = int(os.environ["KEEP_PER_OPEN_PR"])
          CLOSED_GRACE = timedelta(days=int(os.environ["CLOSED_PR_GRACE_DAYS"]))
          UNTAGGED_GRACE = timedelta(days=int(os.environ["UNTAGGED_GRACE_DAYS"]))
          DRY_RUN = os.environ["DRY_RUN"].lower() == "true"
          NOW = datetime.now(timezone.utc)
          PR_TAG_RE = re.compile(r"^pr-(\d+)(?:-.*)?$")

          def gh_api(path, method="GET"):
              cmd = ["gh", "api", "-X", method, path]
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  raise RuntimeError(f"gh api {method} {path} failed: {r.stderr.strip()}")
              return json.loads(r.stdout) if r.stdout.strip() else None

          def gh_paginate(path):
              cmd = ["gh", "api", "--paginate", path]
              r = subprocess.run(cmd, capture_output=True, text=True, check=True)
              return json.loads(r.stdout) if r.stdout.strip() else []

          def parse_ts(s):
              return datetime.fromisoformat(s.replace("Z", "+00:00"))

          pr_state_cache = {}
          def pr_state(num):
              if num in pr_state_cache:
                  return pr_state_cache[num]
              try:
                  pr = gh_api(f"/repos/{REPO}/pulls/{num}")
                  state = pr["state"]
                  closed_at = parse_ts(pr["closed_at"]) if pr.get("closed_at") else None
                  result = (state, closed_at)
              except Exception as e:
                  print(f"  ! could not fetch PR #{num}: {e}; treating as long-closed")
                  result = ("closed", NOW - CLOSED_GRACE * 10)
              pr_state_cache[num] = result
              return result

          def delete_version(pkg, version_id, reason):
              prefix = "[DRY RUN] " if DRY_RUN else ""
              print(f"  {prefix}deleting {pkg} version {version_id} — {reason}")
              if DRY_RUN:
                  return
              try:
                  gh_api(f"/orgs/{ORG}/packages/container/{pkg}/versions/{version_id}", method="DELETE")
              except Exception as e:
                  print(f"  ::warning::failed to delete {pkg} version {version_id}: {e}")

          total_deleted = 0
          for pkg in PACKAGES:
              print(f"=== Processing {pkg} ===")
              versions = gh_paginate(f"/orgs/{ORG}/packages/container/{pkg}/versions")
              print(f"  found {len(versions)} versions")

              pr_versions = {}
              for v in versions:
                  tags = v.get("metadata", {}).get("container", {}).get("tags", [])
                  created = parse_ts(v["created_at"])

                  if not tags:
                      age = NOW - created
                      if age > UNTAGGED_GRACE:
                          delete_version(pkg, v["id"], f"untagged, age {age.days}d")
                          total_deleted += 1
                      continue

                  pr_nums = set()
                  non_pr_tags = []
                  for t in tags:
                      m = PR_TAG_RE.match(t)
                      if m:
                          pr_nums.add(int(m.group(1)))
                      else:
                          non_pr_tags.append(t)

                  if non_pr_tags:
                      # Has a non-PR tag (main, latest, release tag) — leave alone
                      continue

                  if len(pr_nums) > 1:
                      print(f"  ! version {v['id']} has multiple PR tags {pr_nums}; skipping")
                      continue

                  pr_num = next(iter(pr_nums))
                  pr_versions.setdefault(pr_num, []).append((created, v))

              for pr_num, items in pr_versions.items():
                  state, closed_at = pr_state(pr_num)
                  items.sort(key=lambda x: x[0], reverse=True)

                  if state == "closed":
                      reference_time = closed_at or NOW
                      if NOW - reference_time > CLOSED_GRACE:
                          for _, v in items:
                              delete_version(pkg, v["id"], f"PR #{pr_num} closed {(NOW - reference_time).days}d ago")
                              total_deleted += 1
                      else:
                          print(f"  PR #{pr_num} closed within grace period; keeping {len(items)} version(s)")
                  else:
                      to_keep = items[:KEEP_PER_OPEN_PR]
                      to_delete = items[KEEP_PER_OPEN_PR:]
                      print(f"  PR #{pr_num} open; keeping {len(to_keep)}, pruning {len(to_delete)}")
                      for _, v in to_delete:
                          delete_version(pkg, v["id"], f"PR #{pr_num} open, beyond keep-last-{KEEP_PER_OPEN_PR}")
                          total_deleted += 1

          print(f"=== Done. {'Would delete' if DRY_RUN else 'Deleted'} {total_deleted} version(s). ===")
          PY
